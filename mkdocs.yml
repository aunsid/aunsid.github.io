site_name: Aun
site_url: https://aunsid.github.io
site_description: Machine learning, finance, and software engineering — notes and tutorials.
site_author: Aun

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.path
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - About: about.md
  - ML:
    - ml/index.md
    - "Chapter 1 — Language Models From Scratch":
      - ml/tokenizer/index.md
      - Tokenization:
        - Tokens: ml/tokenizer/tokens.md
        - Byte Pair Encoding: ml/tokenizer/notes.md
      - Embeddings: ml/embeddings/index.md
      - Attention:
        - Self-Attention: ml/attention/index.md
        - Types of Attention: ml/attention/types.md
      - Normalization:
        - Layer Norm & RMS Norm: ml/normalization/index.md
        - Pre-Norm vs Post-Norm: ml/normalization/pre_post.md
      - Feed-Forward Networks: ml/feed_forward/index.md
      - Transformer Architecture: ml/transformer/index.md
      - Training:
        - Backpropagation & Loss: ml/training/index.md
        - Optimizers: ml/training/optimizers.md
        - Learning Rates: ml/training/learning_rates.md
      - Inference:
        - Decoding Strategies: ml/inference/index.md
        - Top-k & Top-p Sampling: ml/inference/sampling.md
        - KV Cache: ml/inference/kv_cache.md
      - Scaling:
        - Scaling Laws: ml/scaling/index.md
        - Parallelism: ml/scaling/parallelism.md
    - "Chapter 2 — Vision":
      - ml/vision/index.md
      - Image Representation: ml/vision/image_representation.md
      - Convolutions & CNNs: ml/vision/cnn.md
      - CNN Architectures: ml/vision/architectures.md
      - Normalization: ml/vision/normalization.md
      - Vision Transformers: ml/vision/vit.md
    - "Chapter 3 — Vision-Language Models":
      - ml/vlm/index.md
      - Contrastive Learning: ml/vlm/contrastive.md
      - CLIP: ml/vlm/clip.md
      - Architectures: ml/vlm/architectures.md
      - Training VLMs: ml/vlm/training.md
  - Finance:
    - finance/index.md
    - How Finance Works: finance/how_finance_works.md
  - Others:
    - others/index.md
    - Algorithms:
      - Sliding Window: others/algorithms/sliding_window.md
    - System Design:
      - Basics: others/system_design/basics.md
      - References: others/system_design/references.md

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - tables
  - admonition
  - pymdownx.details
  - attr_list

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
