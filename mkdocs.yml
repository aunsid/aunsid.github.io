site_name: Aun
site_url: https://aunsid.github.io
site_description: Machine learning, finance, and software engineering — notes and tutorials.
site_author: Aun

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.path
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - About: about.md
  - Experience: experience.md
  - Notes:
    - ml/index.md
    - "Chapter 1 — Language Models From Scratch":
      - ml/tokenizer/index.md
      - Tokenization:
        - Tokens: ml/tokenizer/tokens.md
        - Byte Pair Encoding: ml/tokenizer/notes.md
      - Embeddings: ml/embeddings/index.md
      - Attention:
        - Self-Attention: ml/attention/index.md
        - Types of Attention: ml/attention/types.md
      - Normalization:
        - Layer Norm & RMS Norm: ml/normalization/index.md
        - Pre-Norm vs Post-Norm: ml/normalization/pre_post.md
      - Inference:
        - KV Cache: ml/inference/kv_cache.md
    - "Chapter 2 — Vision":
      - ml/vision/index.md
      - Convolutions & CNNs: ml/vision/cnn.md
    - "Chapter 3 — Post-Training":
      - ml/post_training/index.md
      - RLHF: ml/post_training/rlhf.md
      - GRPO: ml/post_training/grpo.md
    - Algorithms:
      - Sliding Window: others/algorithms/sliding_window.md
    - System Design:
      - Basics: others/system_design/basics.md
      - References: others/system_design/references.md

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - tables
  - admonition
  - pymdownx.details
  - attr_list

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
